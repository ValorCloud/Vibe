# .github/workflows/e2e.yml
# Playwright E2E workflow for Lyricist Pro / Vibe
#
# Strategy:
#   - PR gate  : runs the "smoke" project (chromium only, fast)
#   - main     : runs the full cross-browser suite
#
# All AI backends are mocked by Playwright route interception —
# NO real API keys are needed.

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Smoke gate (PR + main) — blocks merge on failure
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke (chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build
        env:
          VITE_LYRIA_INTERNAL_TOKEN: smoke-stub
          VITE_SUNO_MODE: dev

      - name: Run smoke tests
        run: npx playwright test --project=chromium-smoke
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Full suite (main branch only) — cross-browser
  # ---------------------------------------------------------------------------
  full:
    name: Full suite (${{ matrix.browser }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Build app
        run: npm run build
        env:
          VITE_LYRIA_INTERNAL_TOKEN: full-stub
          VITE_SUNO_MODE: dev

      - name: Run full E2E suite (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14
