<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Google Drive Auth</title></head>
<body>
<script>
  // Parse the authorization code (or error) from the URL query parameters and postMessage it to the opener.
  // PKCE flow: callback receives ?code=... or ?error=..., not #access_token.
  (function () {
    var search = window.location.search.slice(1);
    var params = {};
    search.split('&').forEach(function (pair) {
      var parts = pair.split('=');
      if (parts.length === 2) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
    });

    var msg = { type: 'GDRIVE_CODE' };
    if (params['code']) {
      msg.code = params['code'];
    } else {
      msg.error = params['error'] || 'NO_CODE';
    }

    // Validate origin before posting message (CSP: only post to same origin)
    var expectedOrigin = window.location.origin;

    // Check if window.opener or window.parent exists before posting message
    // window.opener is used for popup auth, window.parent for iframe auth
    var target = window.opener || window.parent;
    if (target && target !== window) {
      try {
        // Validate that target origin matches expected origin to prevent token leakage
        target.postMessage(msg, expectedOrigin);
      } catch (e) {
        // PostMessage failed - log to console for debugging
        console.error('[gdrive-callback] Failed to post message:', e);
      }
    } else {
      // No valid parent/opener - show error in console and document
      console.error('[gdrive-callback] No window.opener or window.parent available');
      document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;color:#c00;">Authentication failed: unable to communicate with parent window. Please try again or check your popup blocker settings.</div>';
    }

    // Only close if we have a valid opener (popup case)
    // Don't close for iframe case (parent !== window but opener is null)
    if (window.opener) {
      window.close();
    }
  })();
</script>
</body>
</html>
